<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Map - Priorités</title>
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/nodes.css">
<link rel="stylesheet" href="styles/modal.css">
<link rel="stylesheet" href="styles/dark.css">
<link rel="stylesheet" href="styles/landing.css">
</head>
<body>

<!-- ── Landing Page (shown when not logged in) ── -->
<div id="landing" style="display:none">
  <div class="landing-card">
    <div class="landing-logo">
      <span class="landing-logo-icon">M</span>
    </div>
    <h1 class="landing-title">Mind Map</h1>
    <p class="landing-subtitle">Vos priorités, visualisées.</p>
    <form id="auth-form" class="landing-form">
      <input type="email" id="auth-email" placeholder="Email" required>
      <input type="password" id="auth-password" placeholder="Mot de passe" required minlength="6">
      <button type="submit" id="btn-sign-in" class="landing-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Connexion
      </button>
    </form>
    <p id="auth-message" class="landing-message"></p>
    <p class="landing-hint">Nouveau ? Entrez email + mot de passe pour créer un compte.</p>
  </div>
</div>

<!-- ── App (hidden until logged in) ── -->
<div id="app" style="display:none">

<div id="tb-brand" class="floating-bar top-left">
  <span class="toolbar-logo">J</span>
  <span class="toolbar-title">Jose's Dashboard</span>
</div>

<div id="tb-tools" class="floating-bar top-left-2">
  <button id="btn-export" title="Exporter JSON">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <button id="btn-search" title="Rechercher (Ctrl+K)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
</div>

<div id="tb-actions" class="floating-bar top-right">
  <button id="btn-auth" title="Compte" style="display:none">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </button>
  <button id="dark-toggle" title="Mode sombre">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<div id="canvas-wrapper">
  <div id="canvas">
    <svg class="connections"></svg>
  </div>
</div>

<div id="detail-overlay"></div>
<div id="detail-panel">
  <button class="close-btn">&#x2715;</button>
  <div class="panel-title" id="panel-title"></div>
  <div class="panel-status" id="panel-status"></div>
  <div id="panel-body"></div>
</div>

<div id="zoom-controls">
  <button id="btn-presenter" title="Mode présentation (F)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
  </button>
  <div class="zoom-sep"></div>
  <button id="btn-zoom-out" title="Zoom -">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <span id="zoom-level">85%</span>
  <button id="btn-zoom-in" title="Zoom +">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <div class="zoom-sep"></div>
  <button id="btn-reset-view" title="Recentrer">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
  </button>
</div>

<div id="legend">
  <div class="legend-item" data-filter="done"><div class="legend-dot" style="background:#10b981"></div> Fait</div>
  <div class="legend-item" data-filter="in_progress"><div class="legend-dot" style="background:#3b82f6"></div> En cours</div>
  <div class="legend-item" data-filter="blocked"><div class="legend-dot" style="background:#ef4444"></div> Bloqué</div>
  <div class="legend-item" data-filter="abandoned"><div class="legend-dot" style="background:#1e1e1e"></div> Abandonné</div>
  <div class="legend-item" data-filter="not_started"><div class="legend-dot" style="background:#9ca3af"></div> Pas commencé</div>
</div>

<div id="search-overlay">
  <div id="search-box">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="Rechercher un noeud..." autocomplete="off">
    <kbd>Esc</kbd>
  </div>
  <div id="search-results"></div>
</div>

</div><!-- /app -->

<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
